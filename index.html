<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <section>
            <h1>My To-Do List</h1> 
            <ul style="list-style: none inside;" class="todo-list">
            <li class="task">
                <input type="checkbox" id="gaming">
                <label for="gaming">Gaming Store</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://store.playstation.com/it-it/pages/latest" target="_blank">Store link</a>
                    </li> 
                </ul> 
            </li>          

                
            <li class="task">
               <input type="checkbox" id="report">
               <label for="report">Finish the Report</label>
               <ul class="sub-item">
                   <li>   
                        <a class="sub-item-link" href="https://my.account.sony.com/sonyacct/signin/?duid=000000070009010030eda4a6c1286d2f14440310ded48b380b545709322d88564d3daf8c33a6de1e&response_type=code&client_id=e4a62faf-4b87-4fea-8565-caaabb3ac918&scope=web%3Acore&access_type=offline&state=c9e17c97565034235537270d7a7d5c0663581ab5fdeb9f68e29d12370e8598c0&service_entity=urn%3Aservice-entity%3Apsn&ui=pr&smcid=web%3Astore&redirect_uri=https%3A%2F%2Fweb.np.playstation.com%2Fapi%2Fsession%2Fv1%2Fsession%3Fredirect_uri%3Dhttps%253A%252F%252Fstore.playstation.com%252Fit-it%252Fpages%252Flatest%253Fnonce%253DMRaqAB4Bf1n5O11ilZsU%26x-psn-app-ver%3D%2540sie-ppr-web-session%252Fsession%252Fv5.45.1&auth_ver=v3&error=login_required&error_code=4165&error_description=User+is+not+authenticated&no_captcha=true&cid=25ada701-f3c4-439f-8d3f-4c298b3c7483#/signin/input/id" target="_blank">Request Access</a>
                    </li>
                </ul>
            </li>        
               


            <li class="task">
               <input type="checkbox" id="warranty">
               <label for="warranty">View Playstation's 5 warranty</label>
               <ul class="sub-item">
                   <li>
                       <a class="sub-item-link" href="https://www.playstation.com/it-it/legal/warranties/ps5/" target="_blank">View Warranty</a>
                    </li>
                </ul> 
            </li>     
             
            <li class="task">
               <input type="checkbox" id="processor">
               <label for="processor">Processor Specs</label>
               <ul class="sub-item">
                   <li>
                       <a class="sub-item-link" href="https://www.playstation.com/it-it/support/hardware/ps-vr-light-indicators/" target="_blank">View Processor's Specs</a>
                    </li>
                </ul>
            </li>        
            </ul>
        </section>     
    </main>           
</body>
</html>
